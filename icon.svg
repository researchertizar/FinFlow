<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b52f0"/>
      <stop offset="60%" stop-color="#7c6dfa"/>
      <stop offset="100%" stop-color="#9d8ffc"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Subtle inner shine -->
  <rect width="512" height="256" rx="0" fill="url(#shine)" opacity="0.6"/>
  <!-- Bar 1 -->
  <rect x="96"  y="310" width="72" height="118" rx="16" fill="rgba(255,255,255,0.45)"/>
  <!-- Bar 2 -->
  <rect x="200" y="240" width="72" height="188" rx="16" fill="rgba(255,255,255,0.65)"/>
  <!-- Bar 3 -->
  <rect x="304" y="158" width="72" height="270" rx="16" fill="rgba(255,255,255,0.90)"/>
  <!-- Trend line -->
  <polyline points="132,310 236,240 340,158 416,110"
    stroke="white" stroke-width="24"
    fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- Arrowhead -->
  <polygon points="416,110 374,120 388,158" fill="white" opacity="0.95"/>
  <!-- FF monogram watermark -->
  <text x="76" y="122" font-family="-apple-system,system-ui,sans-serif"
    font-weight="900" font-size="88" letter-spacing="-6"
    fill="rgba(255,255,255,0.14)">FF</text>
</svg>
